<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GameStoreID</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <div id="loginBox" class="login-box">
            <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Masukkan Password Rahasia">
            <button id="loginBtn"><i class="fas fa-key"></i> Login</button>
            <div id="loginError" class="error-msg"></div>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="admin-header">
                <h1><i class="fas fa-crown"></i> Dashboard Admin</h1>
                <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <div class="admin-actions">
                <button id="addProductBtn" class="btn-add"><i class="fas fa-plus-circle"></i> Tambah Produk Baru</button>
                <button id="changeWaBtn" class="btn-wa-setting"><i class="fab fa-whatsapp"></i> Ganti Nomor WA Admin</button>
                <button id="changePasswordBtn" class="btn-password"><i class="fas fa-lock"></i> Ganti Password Admin</button>
            </div>

            <div class="product-list">
                <h3>Daftar Semua Produk</h3>
                <div id="adminProductsGrid" class="admin-grid">
                    <div class="loading">Memuat...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
